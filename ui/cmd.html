<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>DAEDALUS — Command Panel</title>
  <link rel="icon" href="/assets/daedalus.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d0f14;
      --panel:  #151820;
      --edge:   #252a36;
      --text:   #e8ecf4;
      --muted:  #6b7280;
      --ok:     #22c55e;
      --warn:   #f59e0b;
      --err:    #ef4444;
      --accent: #3b82f6;
      --purple: #8b5cf6;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--edge);
    }
    .brand { font-size: 14px; font-weight: 700; }
    .brand span { color: var(--muted); font-weight: 400; font-size: 11px; margin-left: 6px; }

    #connPill {
      font-size: 10px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; background: var(--err); color: #fff;
      letter-spacing: .05em; transition: background .3s;
    }
    #connPill.ok { background: var(--ok); }

    /* ── Last cmd bar ── */
    #lastBar {
      flex-shrink: 0;
      padding: 4px 14px;
      background: color-mix(in oklab, var(--panel) 60%, var(--bg));
      border-bottom: 1px solid var(--edge);
      font-size: 11px; color: var(--muted);
      display: flex; gap: 6px; align-items: center;
    }
    #lastBar b { color: var(--text); font-family: ui-monospace, monospace; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--panel); border: 1px solid var(--edge);
      border-radius: 8px; padding: 8px 18px;
      font-size: 12px; font-weight: 600;
      transition: transform .2s, opacity .2s;
      opacity: 0; pointer-events: none; z-index: 100;
      max-width: 90vw; text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.ok  { border-color: var(--ok);  color: var(--ok); }
    #toast.err { border-color: var(--err); color: var(--err); }

    /* ── Full-screen grid ── */
    main {
      flex: 1;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1.5fr 1fr;
      grid-template-rows: 1fr 1fr 1fr auto;
      grid-template-areas:
        "cx    state  cal"
        "sim   state  mech"
        "gcs   state  mech"
        "man   man    man";
      gap: 6px;
      padding: 6px;
    }

    #card-cx    { grid-area: cx; }
    #card-state { grid-area: state; }
    #card-cal   { grid-area: cal; }
    #card-sim   { grid-area: sim; }
    #card-mech  { grid-area: mech; }
    #card-gcs   { grid-area: gcs; }
    #card-man   { grid-area: man; }

    /* ── Cards ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .card-title {
      flex-shrink: 0;
      padding: 5px 10px;
      font-size: 9px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted);
      background: color-mix(in oklab, var(--edge) 35%, transparent);
      border-bottom: 1px solid var(--edge);
    }
    .card-body {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 5px;
      padding: 6px;
    }
    /* default: column (buttons stack vertically) */
    .card-body { flex-direction: column; }
    /* row: buttons sit side-by-side and fill height */
    .card-body.row { flex-direction: row; }

    /* ── Buttons ── */
    .btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      min-height: 28px;
      padding: 4px 8px;
      border: 1.5px solid transparent; border-radius: 6px;
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; letter-spacing: .02em;
      transition: filter .12s, transform .08s;
      user-select: none; -webkit-tap-highlight-color: transparent;
      width: 100%;
    }
    .btn:active { transform: scale(.97); filter: brightness(.8); }

    .btn.on     { background: var(--ok);     color: #fff; border-color: var(--ok); }
    .btn.off    { background: var(--err);    color: #fff; border-color: var(--err); }
    .btn.blue   { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.warn   { background: var(--warn);   color: #000; border-color: var(--warn); }
    .btn.ghost  { background: transparent;   color: var(--text); border-color: var(--edge); }
    .btn.purple { background: var(--purple); color: #fff; border-color: var(--purple); }
    .btn.dim    { background: color-mix(in oklab, var(--edge) 70%, transparent); color: var(--muted); border-color: var(--edge); }

    /* ── Pair: two/three buttons side-by-side sharing one row ── */
    .pair {
      display: flex;
      gap: 5px;
      flex: 1;
      min-height: 0;
    }
    /* inside a pair, buttons fill the row naturally (flex:1 already set) */

    /* ── State grid: 2 cols × 4 rows filling the card ── */
    .state-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(4, 1fr);
      gap: 5px;
      min-height: 0;
    }
    .state-grid .btn { width: 100%; height: 100%; }

    /* ── Cal grid: 3 cols × 2 rows ── */
    .cal-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr 1fr;
      gap: 5px;
      min-height: 0;
    }
    .cal-grid .btn { width: 100%; height: 100%; }

    /* ── Mech groups: label + pair, 3 equal groups ── */
    .mech-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }
    .sub {
      flex-shrink: 0;
      font-size: 9px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Manual card ── */
    #card-man .card-body { flex-direction: row; align-items: center; }
    #card-man input {
      flex: 1;
      height: 36px; min-height: 36px;
      padding: 0 10px;
      background: var(--bg);
      border: 1.5px solid var(--edge);
      border-radius: 6px;
      color: var(--text);
      font-family: ui-monospace, monospace;
      font-size: 13px; outline: none;
    }
    #card-man input:focus { border-color: var(--accent); }
    #card-man .btn {
      flex: none; width: auto;
      height: 36px; min-height: 36px;
      padding: 0 18px;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">DAEDALUS <span>#1043 — Command Panel</span></div>
  <div id="connPill">OFFLINE</div>
</header>
<div id="lastBar">Last sent: <b id="lastCmd">&mdash;</b></div>

<main>

  <!-- CX ── single pair fills the card -->
  <div class="card" id="card-cx">
    <div class="card-title">Telemetry (CX)</div>
    <div class="card-body row">
      <button class="btn on"  onclick="send('CX,ON')">CX ON</button>
      <button class="btn off" onclick="send('CX,OFF')">CX OFF</button>
    </div>
  </div>

  <!-- STATE ── 2-col × 4-row grid spanning 3 rows -->
  <div class="card" id="card-state">
    <div class="card-title">State Override</div>
    <div class="card-body">
      <div class="state-grid">
        <button class="btn blue"  onclick="send('STATE,IDLE_SAFE')">IDLE SAFE</button>
        <button class="btn blue"  onclick="send('STATE,LAUNCH_PAD')">LAUNCH PAD</button>
        <button class="btn blue"  onclick="send('STATE,ASCENT')">ASCENT</button>
        <button class="btn warn"  onclick="send('STATE,APOGEE')">APOGEE</button>
        <button class="btn warn"  onclick="send('STATE,DESCENT')">DESCENT</button>
        <button class="btn warn"  onclick="send('STATE,PROBE_REALEASE')">PROBE REL.</button>
        <button class="btn warn"  onclick="send('STATE,PAYLOAD_REALEASE')">PAYLOAD REL.</button>
        <button class="btn ghost" onclick="send('STATE,LANDED')">LANDED</button>
      </div>
    </div>
  </div>

  <!-- CAL ── 3-col × 2-row grid -->
  <div class="card" id="card-cal">
    <div class="card-title">Calibration &amp; Reset</div>
    <div class="card-body">
      <div class="cal-grid">
        <button class="btn blue"  onclick="send('CAL')">CAL</button>
        <button class="btn off"   onclick="sendConfirm('RESET','Send RESET to satellite?')">RESET</button>
        <button class="btn ghost" onclick="send('CAL,MAG,START')">MAG START</button>
        <button class="btn ghost" onclick="send('CAL,NORTH')">CAL NORTH</button>
        <button class="btn ghost" onclick="send('CAL,MAG,STATUS')">MAG STATUS</button>
        <button class="btn dim"   onclick="send('CAL,MAG,RESET')">MAG RESET</button>
      </div>
    </div>
  </div>

  <!-- SIM ── 3 buttons side-by-side -->
  <div class="card" id="card-sim">
    <div class="card-title">Simulation</div>
    <div class="card-body row">
      <button class="btn blue"   onclick="send('SIM,ENABLE')">SIM ENABLE</button>
      <button class="btn on"     onclick="send('SIM,ACTIVATE')">SIM ACTIVATE</button>
      <button class="btn off"    onclick="send('SIM,DISABLE')">SIM DISABLE</button>
    </div>
  </div>

  <!-- MECH ── 3 labeled groups spanning 2 rows -->
  <div class="card" id="card-mech">
    <div class="card-title">Mechanical</div>
    <div class="card-body">
      <div class="mech-group">
        <span class="sub">Payload Release (PL)</span>
        <div class="pair">
          <button class="btn on"  onclick="send('MEC,PL,ON')">PL ON</button>
          <button class="btn off" onclick="send('MEC,PL,OFF')">PL OFF</button>
        </div>
      </div>
      <div class="mech-group">
        <span class="sub">Instrument Bay (INS)</span>
        <div class="pair">
          <button class="btn on"  onclick="send('MEC,INS,ON')">INS ON</button>
          <button class="btn off" onclick="send('MEC,INS,OFF')">INS OFF</button>
        </div>
      </div>
      <div class="mech-group">
        <span class="sub">Parachute Motor (PAR)</span>
        <div class="pair">
          <button class="btn blue"   onclick="send('MEC,PAR,CW')">PAR CW</button>
          <button class="btn purple" onclick="send('MEC,PAR,ACW')">PAR ACW</button>
          <button class="btn off"    onclick="send('MEC,PAR,OFF')">PAR OFF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- GCS ── 2 rows -->
  <div class="card" id="card-gcs">
    <div class="card-title">Ground Station (Local)</div>
    <div class="card-body">
      <div class="pair">
        <button class="btn on"  onclick="localCmd('/dummy.on')">Dummy ON</button>
        <button class="btn off" onclick="localCmd('/dummy.off')">Dummy OFF</button>
      </div>
      <div class="pair">
        <button class="btn dim" onclick="localCmd('/log.clear')">Clear Log Session</button>
      </div>
    </div>
  </div>

  <!-- MANUAL ── compact bottom bar -->
  <div class="card" id="card-man">
    <div class="card-title">Manual Command</div>
    <div class="card-body">
      <input id="manInput" type="text"
        placeholder="e.g.  CX,ON  ·  SIMP,101325  ·  /dummy.on"
        autocomplete="off" autocapitalize="characters" spellcheck="false" />
      <button class="btn blue" onclick="sendManual()">Send</button>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  let _tt;
  function toast(msg, type = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'show ' + type;
    clearTimeout(_tt); _tt = setTimeout(() => t.className = '', 2500);
  }
  function setLast(cmd) { document.getElementById('lastCmd').textContent = cmd; }

  async function send(cmd) {
    setLast(cmd);
    try {
      const r = await fetch('/api/command', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cmd }),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      toast('Sent: ' + cmd, 'ok');
    } catch (e) { toast('Failed: ' + e.message, 'err'); }
  }

  async function sendConfirm(cmd, msg) {
    if (!confirm(msg)) return;
    await send(cmd);
  }

  async function localCmd(cmd) {
    setLast(cmd);
    const c = cmd.toLowerCase();
    try {
      if (c === '/log.clear') {
        await fetch('/api/log/set', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ label: '' }),
        });
        toast('Log session cleared', 'ok');
      } else if (c === '/dummy.on') {
        await fetch('/api/dummy/start', { method: 'POST' });
        toast('Dummy data started', 'ok');
      } else if (c === '/dummy.off') {
        await fetch('/api/dummy/stop', { method: 'POST' });
        toast('Dummy data stopped', 'ok');
      }
    } catch (e) { toast('Failed: ' + e.message, 'err'); }
  }

  function sendManual() {
    const inp = document.getElementById('manInput');
    const v = inp.value.trim();
    if (!v) return;
    inp.value = '';
    v.startsWith('/') ? localCmd(v) : send(v);
  }

  document.getElementById('manInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendManual();
  });

  const pill = document.getElementById('connPill');
  async function checkConn() {
    try {
      const r = await fetch('/api/health', { cache: 'no-store' });
      pill.textContent = r.ok ? 'ONLINE' : 'ERROR';
      pill.className = r.ok ? 'ok' : '';
    } catch { pill.textContent = 'OFFLINE'; pill.className = ''; }
  }
  checkConn();
  setInterval(checkConn, 5000);
</script>
</body>
</html>
